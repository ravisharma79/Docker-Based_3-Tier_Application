services:

  # ── Database ──────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: python_backend
    restart: unless-stopped
    environment:
      DB_HOST:     db
      DB_PORT:     "3306"
      DB_USER:     ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME:     ${MYSQL_DATABASE}
      PORT:        "5000"
    networks:
      - app_network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Use python to check health — wget/curl not available in python:alpine
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nginx_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    environment:
      BACKEND_URL: http://backend:5000
    networks:
      - app_network
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # nginx:alpine has wget built in
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ── Named Volume ──────────────────────────────────────────────────────────────
volumes:
  db_data:
    name: mysql_persistent_data

# ── Custom Network ────────────────────────────────────────────────────────────
networks:
  app_network:
    name: threetier_network
    driver: bridge